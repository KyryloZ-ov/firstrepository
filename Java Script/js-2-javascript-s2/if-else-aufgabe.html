<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aufgabe</title>
</head>
<body>
    
    <script>

        let Punktzahl = prompt("Geben Sie Ihre Punktzahl ein:");

        if(Punktzahl >= 90){

            document.write("Sehr gut!");
        
        } else if(Punktzahl <= 89 && Punktzahl >= 75) {

            document.write("Gut!");

        } else if(Punktzahl <= 74 && Punktzahl >= 50){

            document.write("Befriedigend!");

        } else if(Punktzahl < 50) {

            document.write("Nicht bestanden!");

        }

    </script>

</body>
</html>
