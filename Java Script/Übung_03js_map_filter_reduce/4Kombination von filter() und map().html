<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kombination von filter() und map()</title>
</head>
<body>
    
    <script>

        const users = [
            { name: 'Ami', age: 17 },
            { name: 'Sara', age: 25 },
            { name: 'Luna', age: 19 },
            { name: 'Ana', age: 15 }
        ];

        const alter = users
        
        .filter(user => user.age > 18)
        .map(user => user.name)

        console.log(alter)

    </script>
</body>
</html>
