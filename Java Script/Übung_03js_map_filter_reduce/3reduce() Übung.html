<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reduce() Übung</title>
</head>
<body>

    <script>

        const numbers = [10, 20, 30, 40];

        const sum = numbers.reduce((acc, num) => acc + num, 0);

        console.log(sum); // 100

    </script>
    
</body>
</html>
