<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>map() Übung</title>
</head>
<body>

    <script>

        const users = [
        { name: 'Thomas', age: 22 },
        { name: 'Sara', age: 25 },
        { name: 'Onna', age: 19 }
        ];

        const names = users.map(user => user.name);

        console.log(names);

    </script>
</body>
</html>
