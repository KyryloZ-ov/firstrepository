<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reduce() Übung (Maximum finden)</title>
</head>
<body>
    
    <script>
        const numbers = [3, 8, 15, 6, 2];

            let max = numbers[0];

            for (let i = 1; i < numbers.length; i++) {
                if (numbers[i] > max) {
                max = numbers[i];
            }
        }

        console.log(max); // 15
    </script>

</body>
</html>
