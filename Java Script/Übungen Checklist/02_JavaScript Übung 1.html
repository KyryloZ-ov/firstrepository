<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02_JavaScript Übung 1</title>
</head>
<body>
    
    <script>

            const a = Number(prompt("Geben Sie ein Zahl ein:"));
            const b = Number(prompt("Geben Sie multiplikator ein:"))
            let erg = 1

        for (let i = 0; i < b; i++) {
            erg = erg * a
        }

        console.log("Zahl ist: " + erg)
    </script>

</body>
</html>
