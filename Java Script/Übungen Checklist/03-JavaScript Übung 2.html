<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03-JavaScript Übung 2</title>
</head>
<body>

    <script>
        function fakultaet(x) {
        let ergebnis = 1;

        while (x > 1) {
            ergebnis = ergebnis * x;
            x = x - 1;
        }

        return ergebnis;
        }

        console.log(fakultaet(5)); 
    </script>
    
</body>
</html>
