        do{

            let eingabe = prompt("Bitte Zahl eingeben (negativ = Ende):");

            if (isNaN(eingabe) || eingabe === "" || eingabe === null) {
                alert("Ungültige Eingabe!");
                continue;
            }

            let zahl = Number(eingabe);

            if (zahl < 0) {
                break;
            }

            summe += zahl;
            anzahl++;

        }while(true)

        alert("Anzahl gültiger Werte: " + anzahl + "\nSumme: " + summe);
