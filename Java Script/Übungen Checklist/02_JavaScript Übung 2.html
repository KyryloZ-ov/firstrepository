<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02_JavaScript Übung 2</title>
</head>
<body>
    
    <script>

        let x = Number(prompt("Geben sie Zahl ein:"));
        let ergebnis = 1;

        while (x > 1) {
            ergebnis = ergebnis * x;
            x = x - 1;
        }

        console.log(ergebnis);

    </script>

</body>
</html>
