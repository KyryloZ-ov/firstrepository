<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03-JavaScript Übung 1</title>
</head>
<body>
    
    <script>
            
        function potenz(a, b) {
            let ergebnis = 1;

            for (let i = 0; i < b; i++) {
                ergebnis = ergebnis * a;
            }

            return ergebnis;
        }

        console.log(potenz(2, 3));

    </script>

</body>
</html>
