<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aufgabe 4: Fakultät n!</title>
</head>
<body>
    
    <script>

        const n = Number(prompt("Geben sie eine Zahl ein:"));
        let fakultaet = 1;

        for (let i = 1; i <= n ; i++){
            if (i === 1) {
                fakultaet = 1;
            } else {
                fakultaet *= i;
            }
        }

        console.log("Die Fakultät von " + n + " ist: " + fakultaet);
        document.body.textContent = "Die Fakultät von " + n + " ist: " + fakultaet;

    </script>
</body>
</html>
