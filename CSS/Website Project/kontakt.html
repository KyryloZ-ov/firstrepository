        <h1>Kontakt</h1>
        <p>Schreiben Sie uns eine Nachricht.</p>

        <form>
            <label>Name</label>
            <input type="text" required>

            <label>E-Mail</label>

            <label>Nachricht</label>
            <textarea required></textarea>

                <button type="submit" class="btn">Absenden</button>
            </div>
        </form>
    </section>
